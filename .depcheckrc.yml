ignores:
  - depcheck
  - declapract
  - declapract-typescript-ehmpathy
  - '@commitlint/config-conventional'
  - serverless-prune-plugin
  - husky
  - if-env
  - '@swc/core'
  - '@swc/jest'
  - rhachet
  - rhachet-brains-anthropic
  - rhachet-brains-fireworksai
  - rhachet-brains-xai
  - rhachet-brains-fireworksai
  - rhachet-roles-bhrain
  - rhachet-roles-bhuild
  - rhachet-roles-ehmpathy
  - rhachet-roles-rhachet
  - rhachet-roles-ghlitch
  # peers imported only by the vendored ghlitch role skill (use.vpc.tunnel.ts);
  # declastruct-aws is this repo itself, declastruct-unix-network is a consumer-only peer
  - declastruct-aws
  - declastruct-unix-network
  - "@tsconfig/node20"
  - "@tsconfig/strictest"
  - "@biomejs/biome"
  - esbuild-register
  - tsx
  - "@src/*"
  - "@src/.*"
  - tsc-alias
ignorePatterns:
  # rmsafe soft-deletes files into this cache; stale trashed files must not be
  # scanned for deps (e.g. a removed file that still imported simple-log-methods)
  - .agent/.cache
