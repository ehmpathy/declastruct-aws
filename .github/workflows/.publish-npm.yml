name: .publish-npm

on:
  workflow_call:

permissions:
  id-token: write # required for oidc

jobs:
  install:
    uses: ./.github/workflows/.install.yml

  publish:
    runs-on: ubuntu-24.04
    needs: [install]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set node-version
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org/" # required to publish
          node-version-file: ".nvmrc"

      - name: node-modules cache get
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: ./node_modules
          key: ${{ needs.install.outputs.node-modules-cache-key }}

      - name: verify oidc auth
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r '.value')
          PACKAGE_NAME_PLAIN=$(jq -r '.name' package.json)
          PACKAGE_NAME_ENCODED=$(printf '%s' "$PACKAGE_NAME_PLAIN" | jq -sRr @uri)
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $OIDC_TOKEN" "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/$PACKAGE_NAME_ENCODED")
          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "oidc: configured for $PACKAGE_NAME_PLAIN"
          else
            echo "::error::oidc: not configured for $PACKAGE_NAME_PLAIN (http $HTTP_CODE). add oidc by-hand at https://www.npmjs.com/package/$PACKAGE_NAME_ENCODED/access"
            exit 1
          fi

      - name: verify oidc compat
        run: |
          # oidc publish requires npm >= 11.5.1; pin the EXACT npm version rather
          # than float npm@latest. npm@latest rolled to npm@12+, which raises its
          # node engine floor above the node pinned in .nvmrc (22.21.0) and breaks
          # this step with EBADENGINE. read the pin from .npm-version, the single
          # source of truth for npm (mirrors .nvmrc for node), so it lives in one
          # place. (packageManager in package.json is unusable here — pnpm's
          # action-setup reads that field and would reject a non-pnpm value.)
          NPM_VERSION_PINNED=$(cat .npm-version | tr -d '[:space:]')
          if [ "$(npm --version)" != "$NPM_VERSION_PINNED" ]; then
            echo "npm $(npm --version) != $NPM_VERSION_PINNED, will install pinned npm now..."
            npm install -g "npm@$NPM_VERSION_PINNED"
          else
            echo "npm $NPM_VERSION_PINNED already installed, ready to use!"
          fi

      - name: build
        run: npm run build

      - name: publish
        run: npm publish --access public --provenance
